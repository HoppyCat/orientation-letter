<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SoulMode — soul-stack GitHub README banner</title>
<desc>Dark banner reading 'SoulMode' with tagline 'The geometry that bends the light. Soul files that build sediment, not just instructions.' with blue-green brand colors on black background, featuring prism-shaped light element</desc>

<rect width="680" height="200" fill="#080810"/>
<rect x="0" y="0" width="3" height="200" fill="#4BB8C5"/>

<!-- prism light refraction element (right side) -->
<polygon points="540,30 590,100 540,170" fill="none" stroke="#4BB8C5" stroke-width="1" opacity="0.3"/>
<!-- refracted beams -->
<line x1="590" y1="100" x2="660" y2="55" stroke="#4BB8C5" stroke-width="0.8" opacity="0.4"/>
<line x1="590" y1="100" x2="665" y2="80" stroke="#9B7FD4" stroke-width="0.7" opacity="0.35"/>
<line x1="590" y1="100" x2="668" y2="100" stroke="#00C875" stroke-width="0.8" opacity="0.4"/>
<line x1="590" y1="100" x2="665" y2="122" stroke="#4BB8C5" stroke-width="0.7" opacity="0.3"/>
<line x1="590" y1="100" x2="660" y2="148" stroke="#00C875" stroke-width="0.8" opacity="0.35"/>
<!-- incoming beam -->
<line x1="490" y1="100" x2="540" y2="100" stroke="#e8e4dc" stroke-width="1" opacity="0.5"/>

<!-- star field -->
<circle cx="560" cy="40" r="1.2" fill="#4BB8C5" opacity="0.5"/>
<circle cx="620" cy="30" r="1.5" fill="#4BB8C5" opacity="0.4"/>
<circle cx="655" cy="55" r="0.7" fill="#e8e4dc" opacity="0.3"/>
<circle cx="635" cy="150" r="0.9" fill="#4BB8C5" opacity="0.3"/>
<circle cx="580" cy="160" r="0.6" fill="#e8e4dc" opacity="0.2"/>
<circle cx="545" cy="75" r="0.8" fill="#4BB8C5" opacity="0.4"/>
<circle cx="625" cy="170" r="1.0" fill="#e8e4dc" opacity="0.2"/>

<!-- main heading -->
<text x="36" y="78" font-family="Georgia, serif" font-size="46" font-weight="700" font-style="italic" letter-spacing="-0.5"><tspan fill="#4BB8C5">Soul</tspan><tspan fill="#00C875">Mode</tspan></text>

<!-- tagline line 1 -->
<text x="38" y="110" font-family="Georgia, serif" font-size="16" font-weight="300" font-style="italic" fill="#b8a99a" letter-spacing="0.3">The geometry that bends the light.</text>
<!-- tagline line 2 -->
<text x="38" y="130" font-family="Georgia, serif" font-size="16" font-weight="400" font-style="italic" fill="#e8e4dc" letter-spacing="0.3">Soul files that build sediment, not just instructions.</text>

<!-- divider -->
<rect x="36" y="148" width="320" height="0.5" fill="#4BB8C5" opacity="0.5"/>

<!-- framework description -->
<text x="36" y="163" font-family="'Courier New', monospace" font-size="11" fill="#00C875" opacity="0.7" letter-spacing="0.05em">SOUL FILES THAT BUILD SEDIMENT AND PRESENCE · OPEN-SOURCE PERSONALITY PRISMS</text>

<!-- prism credit -->
<text x="36" y="178" font-family="'Courier New', monospace" font-size="10" fill="#9B7FD4" opacity="0.75" letter-spacing="0.04em">PRISM RESEARCH WITH CLAUDE · GROK (BENJAMIN · HARPER · LUCAS) · PERPLEXITY · CC-BY-NC 4.0</text>

<!-- github url -->
<text x="36" y="193" font-family="'Courier New', monospace" font-size="11" fill="#4BB8C5" opacity="0.8" letter-spacing="0.08em">github.com/hoppycat/soul-stack</text>
</svg>
